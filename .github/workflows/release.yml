name: Release macOS App

on:
  push:
    tags:
      - 'mac-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0)'
        required: true
        default: '0.1.0'

jobs:
  build:
    name: Build & Release
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF_NAME#mac-v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION"

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Swift version
        run: swift --version

      - name: Build universal .app
        run: |
          chmod +x Scripts/package-app.sh
          ./Scripts/package-app.sh "${{ steps.version.outputs.VERSION }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "CostBurn ${{ steps.version.outputs.VERSION }}"
          body: |
            ## CostBurn ${{ steps.version.outputs.VERSION }}

            ### One-command install
            ```bash
            curl -fsSL https://raw.githubusercontent.com/sanjeev-pandey23/costburn/main/install.sh | bash
            ```
            Downloads, strips Gatekeeper quarantine, installs to `~/Applications`, and launches.

            ### Via Homebrew
            ```bash
            brew tap sanjeev-pandey23/costburn
            brew install --cask costburn
            ```

            ### Manual install
            Download `CostBurn-${{ steps.version.outputs.VERSION }}.zip`, unzip, then:
            ```bash
            xattr -dr com.apple.quarantine CostBurn.app
            mv CostBurn.app ~/Applications/
            open ~/Applications/CostBurn.app
            ```
          files: |
            .build/CostBurn-${{ steps.version.outputs.VERSION }}.zip
            .build/CostBurn-${{ steps.version.outputs.VERSION }}.zip.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          SHA256=$(cat ".build/CostBurn-${VERSION}.zip.sha256")
          URL="https://github.com/sanjeev-pandey23/costburn/releases/download/mac-v${VERSION}/CostBurn-${VERSION}.zip"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/sanjeev-pandey23/homebrew-costburn.git" tap-repo
          cd tap-repo
          mkdir -p Casks

          cat > Casks/costburn.rb << RUBY
          cask "costburn" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "${URL}"
            name "CostBurn"
            desc "Neon DB cost monitor for the macOS menu bar"
            homepage "https://github.com/sanjeev-pandey23/costburn"

            app "CostBurn.app"

            zap trash: [
              "~/Library/Preferences/com.sanjeevpandey.costburn.plist",
              "~/Library/Application Support/com.sanjeevpandey.costburn",
            ]
          end
          RUBY

          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add Casks/costburn.rb
          git commit -m "costburn: update to ${VERSION}"
          git push
